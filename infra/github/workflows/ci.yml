name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install -r requirements/dev.txt
      - name: Lint
        run: ruff check src tests simulation
      - name: Test
        run: pytest tests/ -v
      - name: Build API image
        run: docker build -f infra/docker/Dockerfile.api -t ed-api:test .
