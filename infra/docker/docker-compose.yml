services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      USE_GCP: "false"
      LOCAL_DATA_DIR: /app/data/processed
      CORS_ORIGINS: "*"
    volumes:
      - ../../simulation/outputs:/app/simulation/outputs
      - ../../data/processed:/app/data/processed

  dashboard:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.dashboard
    ports:
      - "8501:8501"
    environment:
      ED_API_URL: http://api:8080
    depends_on:
      - api
